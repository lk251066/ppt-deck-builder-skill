interface:
  display_name: "PPT Deck Builder"
  short_description: "Portable PPT workflow with prompt planning, sample packs, image generation, QA, and packaging"
  default_prompt: "Use $ppt-deck-builder to build a PPT from story design through sampled image generation, full image generation, page repair, and packaged deck using only this skill folder. Before any image-generation step, first ask whether the user already has a RunningHub API key. If the user does not specify a provider, explain that the default model is RunningHub 3.1 flash, which maps to rhart-image-n-g31-flash."
